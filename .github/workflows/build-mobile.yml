name: Build Mobile

on:
  workflow_dispatch:
    inputs:
      platform:
        type: choice
        description: Platform to build
        options:
          - all
          - ios
          - android
        default: all
      profile:
        type: choice
        description: Build profile
        options:
          - development
          - preview
          - production
        default: preview
  push:
    tags:
      - "v*"

jobs:
  build:
    name: Trigger EAS Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.30.3

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build (manual trigger)
        if: github.event_name == 'workflow_dispatch'
        working-directory: apps/expo
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait

      - name: Build (release tag)
        if: github.event_name == 'push'
        working-directory: apps/expo
        run: eas build --platform all --profile production --non-interactive --no-wait
